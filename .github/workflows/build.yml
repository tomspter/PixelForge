name: Build PixelForge

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            rust-targets: ""
            args: ""
            artifact-name: windows-x86_64

          - name: Linux x64
            platform: ubuntu-22.04
            rust-targets: ""
            args: ""
            artifact-name: linux-x86_64

          - name: macOS ARM64
            platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact-name: macos-aarch64

          - name: macOS Intel
            platform: macos-latest
            rust-targets: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
            artifact-name: macos-x86_64

          - name: macOS Universal
            platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
            artifact-name: macos-universal

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('PixelForge {0}', github.ref_name) || '' }}
          releaseBody: "PixelForge desktop installers for Windows, macOS, and Linux."
          releaseDraft: true
          prerelease: false
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ${{ matrix.artifact-name }}-[bundle]
